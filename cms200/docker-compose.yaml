services:
  wordpress:
    image: wordpress:6.5-apache
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define('DISABLE_WP_CRON', true);
    volumes:
      - ./wordpress_data:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: mariadb:11.4
    restart: unless-stopped
    command:
      - --innodb-buffer-pool-size=512M
      - --max-connections=100
      - --tmp-table-size=64M
      - --max-heap-table-size=64M
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql
    expose:
      - "3306"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MEMORY_LIMIT: 256M
      UPLOAD_LIMIT: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  php_app:
    build:
      context: .
      dockerfile: mysqli.dockerfile
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8082:80"
    volumes:
      - ./php_app:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:
